name: Auto Fetch Cookies

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  fetch-and-encrypt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Required Packages
        run: |
          python -m pip install --upgrade pip
          pip install requests cryptography

      - name: Unzip main.py with Secret Password
        env:
          ZIP_PASS: ${{ secrets.MY_SECRET_PASS }}
        run: |
          7z x -p"$ZIP_PASS" main.zip -y

      - name: Run Python Script
        env:
          MY_SECRET_PASS: ${{ secrets.MY_SECRET_PASS }}
        run: |
          python main.py
          
      - name: Clean up Unzipped Source Code
        run: |
          rm main.py

      - name: Commit and Push Encrypted JSON
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add head.json
          git commit -m "Auto updated encrypted cookies" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
